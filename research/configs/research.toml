name = "train-loop"
branch_prefix = "research"

[target]
file = "research/train-loop/train.py"
context = ["README.md", "research/train-loop/program.md"]
program = "research/train-loop/program.md"

[experiment]
workdir = "research/train-loop"
log_file = "run.log"
setup = "source /home/v/main/ai/v100/.env && rsync -az --delete ./ gpubox:~/v100-train-loop/"
command = "ssh gpubox 'cd ~/v100-train-loop/research/train-loop && uv run train.py | tee run.log'"
collect = "scp gpubox:~/v100-train-loop/research/train-loop/run.log {{.LogFile}}"
timeout = "10m"
metric = "val_bpb"
direction = "lower"

[experiment.tracking.wandb]
enabled = true
project = "v100"
group = "cloud"
job_type = "train"
run_name = "remote-r{{.Round}}-{{.Commit}}"
tags = ["remote", "cloud", "v100"]
api_key_env = "WANDB_API_KEY"
git_auto_disable = true

[budget]
steps = 15
cost_usd = 0.50
