name = "autoresearch"
branch_prefix = "research"

[target]
file = "train.py"
context = ["README.md", "program.md"]
program = "program.md"

[experiment]
workdir = "."
log_file = "run.log"
setup = "source /home/v/main/ai/v100/.env && rsync -az --delete ./ gpubox:~/autoresearch/"
command = "ssh gpubox 'cd ~/autoresearch && uv run train.py | tee run.log'"
collect = "scp gpubox:~/autoresearch/run.log {{.LogFile}}"
timeout = "10m"
metric = "val_bpb"
direction = "lower"

[experiment.tracking.wandb]
enabled = true
project = "autoresearch"
group = "cloud"
job_type = "train"
run_name = "remote-r{{.Round}}-{{.Commit}}"
tags = ["remote", "cloud", "autoresearch"]
api_key_env = "WANDB_API_KEY"
git_auto_disable = true

[budget]
steps = 15
cost_usd = 0.50
