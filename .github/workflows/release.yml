name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Tag $TAG does not match semver pattern"
            exit 1
          fi

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.TAG }}"
          mkdir -p dist

          # Tree-sitter support blocks Darwin cross-compilation from Ubuntu today.
          # Release the Linux binary here; add native macOS build jobs when we
          # want Darwin artifacts again.
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/v100-linux-amd64 ./cmd/v100

      - name: Generate checksums
        run: |
          cd dist
          sha256sum v100-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/v100-*
            dist/checksums.txt
