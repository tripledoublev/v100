name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: ./scripts/test.sh

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Read golangci-lint version
        id: golangci
        run: echo "version=$(tr -d '\n\r[:space:]' < .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci.outputs.version }}
          args: --timeout=5m ./cmd/... ./internal/...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-test
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Tag $TAG does not match semver pattern"
            exit 1
          fi

      - name: Run tests
        run: ./scripts/test.sh

      - name: Build binaries
        env:
          GOWORK: off
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.TAG }}"
          mkdir -p dist

          # Cross-compile for all platforms
          # Linux
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/v100-linux-amd64 ./cmd/v100
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/v100-linux-arm64 ./cmd/v100

          # Windows
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/v100-windows-amd64.exe ./cmd/v100
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/v100-windows-arm64.exe ./cmd/v100

          # macOS (Intel)
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/v100-darwin-amd64 ./cmd/v100

          # macOS (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/v100-darwin-arm64 ./cmd/v100

      - name: Generate checksums
        run: |
          cd dist
          sha256sum v100-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2.3.2
        with:
          generate_release_notes: true
          files: |
            dist/v100-*
            dist/checksums.txt
